# Gather — single CI/CD workflow: lint, test, build (daemon + desktop),
# release artifacts. Desktop bundles build on Linux, Windows and macOS.
name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write # release job attaches artifacts to tag releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------- lint ----
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: rustfmt
        working-directory: daemon
        run: cargo fmt --check
      - name: clippy
        working-directory: daemon
        run: cargo clippy --all-targets -- -D warnings

  # ---------------------------------------------------------------- test ----
  test:
    name: test (unit + integration vs pgvector)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: gather
          POSTGRES_USER: gather
          POSTGRES_PASSWORD: gather-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gather -d gather"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgres://gather:gather-ci@localhost:5432/gather
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: install tesseract (OCR integration tests)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
      - name: cargo test
        working-directory: daemon
        run: cargo test --all-targets

  # -------------------------------------------------------- build daemon ----
  build-daemon:
    name: build daemon (linux x86_64)
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: release build
        working-directory: daemon
        run: cargo build --release --locked
      - name: smoke-test binary starts and refuses non-loopback bind
        working-directory: daemon
        run: |
          set +e
          GATHER_BIND_ADDR=0.0.0.0:7601 DATABASE_URL=postgres://x@localhost/x \
            ./target/release/gather-daemon
          test $? -ne 0 # must exit non-zero without GATHER_ALLOW_NON_LOOPBACK
      - uses: actions/upload-artifact@v4
        with:
          name: gather-daemon-linux-x86_64
          path: daemon/target/release/gather-daemon
          if-no-files-found: error

  # ------------------------------------------------------- build desktop ----
  build-desktop:
    name: build desktop (${{ matrix.platform }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: install Tauri Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev
      - name: npm install
        working-directory: apps/desktop
        run: npm ci
      - name: typecheck + frontend build
        working-directory: apps/desktop
        run: npm run build
      - name: tauri build
        working-directory: apps/desktop
        run: npm run tauri -- build
      - uses: actions/upload-artifact@v4
        with:
          name: gather-desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

  # ------------------------------------------------------------- release ----
  release:
    name: release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-daemon, build-desktop]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: package daemon binary
        run: |
          chmod +x dist/gather-daemon-linux-x86_64/gather-daemon
          tar -C dist/gather-daemon-linux-x86_64 -czf \
            dist/gather-daemon-linux-x86_64.tar.gz gather-daemon
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gather-daemon-linux-x86_64.tar.gz
            dist/gather-desktop-linux/**/*
            dist/gather-desktop-windows/**/*
            dist/gather-desktop-macos/**/*
          generate_release_notes: true
